<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>ちいさな竜退治 - レトロRPG</title>
<style>
  /* ===== 全体レイアウト（ドラクエ風の黒背景＋青枠UI） ===== */
  :root {
    --dq-blue: #2a6cd4;      /* コマンドウィンドウの青枠 */
    --dq-blue-light: #5b9bff;
    --dq-bg: #000;
    --dq-text: #fff;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: #111;
    color: var(--dq-text);
    font-family: "MS Gothic", "Osaka-Mono", "ＭＳ ゴシック", monospace;
    /* ドット感を出すため丸めや装飾を避ける */
    -webkit-font-smoothing: none;
    image-rendering: pixelated;
    user-select: none;
  }
  #game {
    max-width: 640px;
    margin: 0 auto;
    padding: 8px;
  }
  h1 {
    text-align: center;
    font-size: 18px;
    letter-spacing: 2px;
    margin: 8px 0;
    color: var(--dq-blue-light);
    text-shadow: 1px 1px 0 #000;
  }
  /* プレイ画面は常に固定サイズ（512x384）で表示。縮小はしない。 */
  canvas {
    display: block;
    margin: 0 auto;
    background: #000;
    image-rendering: pixelated;
    border: 2px solid #333;
  }

  /* ===== ドラクエ風ウィンドウ（黒地に太い青白枠＋角丸なし） ===== */
  .dq-window {
    background: var(--dq-bg);
    border: 3px solid #fff;
    outline: 3px solid var(--dq-blue);
    outline-offset: 0;
    padding: 8px 10px;
    margin-top: 8px;
    line-height: 1.6;
    font-size: 15px;
  }

  /* 下部パネル：メッセージ／戦闘ログ（左）とコマンド選択（右）を同じ枠内で共有（ドラクエ風） */
  #panel {
    display: flex;
    align-items: stretch;
    gap: 10px;
    min-height: 88px;
  }
  #message {
    flex: 1 1 auto;
    min-width: 0;
    white-space: pre-wrap;
  }

  /* ステータス表示 */
  #status {
    display: flex;
    flex-wrap: wrap;
    gap: 4px 16px;
    font-size: 13px;
  }
  #status span { white-space: nowrap; }

  /* コマンドメニュー（別段を増やさず、同じ下部枠の右側に表示） */
  #menu {
    display: none;
    flex: 0 0 auto;
    border-left: 2px solid var(--dq-blue);
    padding-left: 12px;
  }
  #menu ul { list-style: none; margin: 0; padding: 0; }
  #menu li {
    padding: 2px 6px 2px 20px;
    position: relative;
    cursor: pointer;
  }
  #menu li.selected::before {
    content: "▶";
    position: absolute;
    left: 4px;
    color: var(--dq-blue-light);
  }
  #menu li.selected { color: #ffe94d; }
  #menu .menu-title { padding-left: 6px; color: var(--dq-blue-light); }

  .hint {
    text-align: center;
    font-size: 12px;
    color: #888;
    margin-top: 6px;
  }
  .blink { animation: blink 0.9s steps(1) infinite; }
  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>

<div id="game">
  <h1>▼ ちいさな 竜退治 ▲</h1>
  <canvas id="canvas" width="512" height="384"></canvas>

  <!-- ステータスウィンドウ -->
  <div id="status" class="dq-window"></div>

  <!-- 下部パネル：メッセージ／戦闘ログとコマンド選択を同じ枠内で共有（ドラクエ風） -->
  <div id="panel" class="dq-window">
    <div id="message">ゆうしゃよ、りゅうおうを たおすのだ！<br>やじるし/WASDで いどう。くさむらで まものが あらわれる。</div>
    <!-- コマンド（バトル時のみ表示。メッセージと同じ枠の右側に出る） -->
    <div id="menu">
      <div class="menu-title">コマンド？</div>
      <ul id="menu-list"></ul>
    </div>
  </div>

  <div class="hint">移動:方向キー/WASD ｜ 決定:Enter/Z/Space ｜ キャンセル:X/Esc ｜ 音:M</div>
</div>

<script>
"use strict";
/* =========================================================================
 * ちいさな竜退治 — 単一HTMLで動くドラクエ風レトロRPG
 * 外部依存ゼロ。file:// でそのまま動作する。
 *
 * 構成:
 *   - データ定義部  : タイル / マップ / 敵 / 呪文 (配列・オブジェクトで分離)
 *   - 描画部        : Canvas 2D による簡易ドット絵
 *   - フィールド    : 移動・ランダムエンカウント・ボス地点判定
 *   - バトル        : ターン制コマンドバトル
 *   - 効果音        : WebAudio による簡易SE
 * ========================================================================= */

/* ---------------- 定数 ---------------- */
const TILE = 32;                 // 1タイルのピクセル数
const MAP_W = 16, MAP_H = 12;    // マップのタイル数
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
ctx.imageSmoothingEnabled = false;

/* ---------------- タイル定義 ---------------- */
// 0:草原(エンカウントあり) 1:道 2:水(進入不可) 3:壁/山(進入不可) 4:城(ボス) 5:町(全回復)
const TILES = {
  0: { name: "くさはら", color: "#3a7d3a", walk: true,  encounter: true  },
  1: { name: "みち",     color: "#c9a25b", walk: true,  encounter: false },
  2: { name: "みずうみ", color: "#2a5db0", walk: false, encounter: false },
  3: { name: "やま",     color: "#6b5238", walk: false, encounter: false },
  4: { name: "しろ",     color: "#888",    walk: true,  encounter: false },
  5: { name: "まち",     color: "#d0d0d0", walk: true,  encounter: false },
};

/* ---------------- マップ（16x12） ----------------
 * 左上が町(5)、右下の城(4)に竜王。水と山で通路を作ってある。
 */
const MAP = [
  [5,1,1,0,0,0,3,3,0,0,0,0,0,2,2,2],
  [0,0,1,0,3,0,0,0,0,3,3,0,0,0,2,2],
  [0,3,1,1,3,0,2,2,0,0,3,0,3,0,0,2],
  [0,3,3,1,3,0,2,2,2,0,0,0,3,3,0,0],
  [0,0,0,1,0,0,0,2,0,0,3,0,0,3,3,0],
  [3,3,0,1,1,1,0,0,0,3,3,0,0,0,0,0],
  [0,0,0,0,3,1,1,1,0,0,0,0,3,3,0,0],
  [0,3,3,0,3,3,3,1,1,1,0,3,3,0,0,0],
  [0,0,3,0,0,0,3,3,3,1,1,1,0,0,3,0],
  [0,0,0,0,2,0,0,0,3,3,3,1,1,1,0,0],
  [2,2,0,0,2,2,0,0,0,0,3,3,3,1,0,4],
  [2,2,2,0,0,2,2,0,0,0,0,0,0,0,1,1],
];

/* ---------------- 呪文定義 ---------------- */
const SPELLS = {
  mera:   { name: "メラ",     mp: 2, type: "attack", power: 12, msg: "ちいさな ほのおを はなった！" },
  gira:   { name: "ギラ",     mp: 5, type: "attack", power: 24, msg: "やけつく いなずま！" },
  hoimi:  { name: "ホイミ",   mp: 3, type: "heal",   power: 30, msg: "きずが かいふくした！" },
  behoimi:{ name: "ベホイミ", mp: 7, type: "heal",   power: 75, msg: "おおきく かいふくした！" },
};

/* ---------------- 敵定義（データ追加しやすいよう配列） ---------------- */
// spr: 簡易ドット絵の色。sprite関数で使う。
const ENEMIES = [
  { id:"slime",  name:"スライム",   hp:16,  atk:8,  def:3,  exp:3,  gold:4,  color:"#39c",  boss:false },
  { id:"drakee", name:"ドラキー",   hp:22,  atk:12, def:5,  exp:5,  gold:7,  color:"#a5c",  boss:false },
  { id:"ghost",  name:"おばけ",     hp:28,  atk:15, def:7,  exp:8,  gold:12, color:"#eee",  boss:false },
  { id:"golem",  name:"ゴーレム",   hp:60,  atk:22, def:14, exp:20, gold:35, color:"#b83",  boss:false },
  { id:"dragon", name:"りゅうおう", hp:180, atk:40, def:22, exp:0,  gold:0,  color:"#3a3",  boss:true  },
];
// 通常エンカウントの出現テーブル（ボス以外）
const WILD_TABLE = ENEMIES.filter(e => !e.boss);

/* ---------------- プレイヤー状態 ---------------- */
const player = {
  x: 0, y: 0,            // マップ上のタイル座標
  dir: "down",           // 向き（ドット絵スプライトの表示に使用）
  level: 1, exp: 0, gold: 0,
  hp: 30, maxhp: 30,
  mp: 8,  maxmp: 8,
  atk: 12, def: 8,
  spells: ["mera", "hoimi"],   // 覚えている呪文（レベルで増える）
};

// レベルアップに必要な累計経験値と、上昇後ステータス
const LEVELS = [
  null, // index0 未使用
  { need:0,   maxhp:30,  maxmp:8,  atk:12, def:8  },
  { need:8,   maxhp:40,  maxmp:12, atk:16, def:11, learn:null    },
  { need:20,  maxhp:52,  maxmp:16, atk:21, def:14, learn:"gira"  },
  { need:40,  maxhp:66,  maxmp:22, atk:27, def:18, learn:null    },
  { need:70,  maxhp:82,  maxmp:30, atk:34, def:23, learn:"behoimi" },
  { need:110, maxhp:100, maxmp:40, atk:42, def:29, learn:null    },
  { need:170, maxhp:125, maxmp:52, atk:52, def:36, learn:null    },
  { need:260, maxhp:155, maxmp:66, atk:64, def:44, learn:null    },
];

/* ---------------- ゲーム状態管理 ---------------- */
const STATE = { TITLE: "title", FIELD: "field", BATTLE: "battle", GAMEOVER: "gameover", CLEAR: "clear" };
let gameState = STATE.TITLE;   // 起動時はまずタイトル画面
let bossDefeated = false;

/* ---------------- DOM参照 ---------------- */
const $status = document.getElementById("status");
const $message = document.getElementById("message");
const $menu = document.getElementById("menu");
const $menuList = document.getElementById("menu-list");

/* =========================================================================
 * 効果音（WebAudio）— 外部音源なしで矩形波を鳴らす簡易SE
 * ========================================================================= */
let audioCtx = null;
let soundOn = true;
function beep(freq, dur, type = "square", vol = 0.06) {
  if (!soundOn) return;
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.value = vol;
    osc.connect(gain); gain.connect(audioCtx.destination);
    const t = audioCtx.currentTime;
    osc.start(t);
    gain.gain.setValueAtTime(vol, t);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    osc.stop(t + dur);
  } catch (e) { /* 音が出せない環境でも無視して進行 */ }
}
const SE = {
  move:   () => beep(220, 0.05),
  select: () => beep(440, 0.05),
  attack: () => beep(160, 0.08, "sawtooth", 0.08),
  spell:  () => beep(660, 0.12, "triangle", 0.07),
  heal:   () => beep(880, 0.14, "sine", 0.07),
  damage: () => beep(110, 0.12, "square", 0.09),
  win:    () => { beep(523,0.1); setTimeout(()=>beep(659,0.1),110); setTimeout(()=>beep(784,0.2),220); },
  levelup:() => { beep(659,0.1); setTimeout(()=>beep(784,0.1),110); setTimeout(()=>beep(1047,0.25),220); },
  dead:   () => { beep(220,0.2,"sawtooth"); setTimeout(()=>beep(150,0.4,"sawtooth"),200); },
};

/* =========================================================================
 * 描画
 * ========================================================================= */
/* ---------------- ドット絵ユーティリティ ----------------
 * 文字列配列のビットマップを、パレット(文字→色)で塗る簡易スプライト描画。
 * '.'/' ' は透明。flip=true で左右反転（横向きスプライトの使い回し用）。
 * imageSmoothingEnabled=false のためピクセルはくっきり出る。
 */
function drawBitmap(rows, pal, ox, oy, s, flip) {
  const w = rows[0].length;
  for (let y = 0; y < rows.length; y++) {
    const row = rows[y];
    for (let x = 0; x < row.length; x++) {
      const c = row[x];
      if (c === "." || c === " ") continue;
      const col = pal[c];
      if (!col) continue;
      const dx = flip ? (w - 1 - x) : x;
      ctx.fillStyle = col;
      ctx.fillRect(ox + dx * s, oy + y * s, s, s);
    }
  }
}
// タイル内の相対座標(px)に矩形を塗る小ヘルパ
function fr(ox, oy, x, y, w, h, col) { ctx.fillStyle = col; ctx.fillRect(ox + x, oy + y, w, h); }

/* ---------------- フィールドタイルのドット絵 ----------------
 * 各タイル 32px 内に数色でパターンを描く。TILES[].walk/encounter の意味は不変。
 */
function drawGrass(ox, oy) {
  fr(ox, oy, 0, 0, TILE, TILE, "#3f7d38");        // 下地
  fr(ox, oy, 0, 18, TILE, 6, "#377030");          // 地面のムラ
  fr(ox, oy, 8, 4, 10, 3, "#377030");
  // 草の房（濃い根元＋明るい穂先）
  const blades = [[6, 18], [15, 9], [23, 20], [11, 25], [27, 12]];
  for (const [bx, by] of blades) {
    fr(ox, oy, bx, by, 2, 5, "#2c5f27");
    fr(ox, oy, bx - 2, by, 2, 3, "#63a544");
    fr(ox, oy, bx + 2, by + 1, 2, 3, "#63a544");
  }
}
function drawRoad(ox, oy) {
  fr(ox, oy, 0, 0, TILE, TILE, "#c2a05a");        // 土の下地
  fr(ox, oy, 0, 0, TILE, 3, "#b08f4a");           // 踏み固めた縁
  fr(ox, oy, 0, 29, TILE, 3, "#b08f4a");
  // 小石
  const peb = [[6, 10], [20, 8], [13, 20], [25, 22], [9, 25]];
  for (const [bx, by] of peb) fr(ox, oy, bx, by, 3, 2, "#8f7336");
  fr(ox, oy, 16, 14, 2, 2, "#d8bd80");
  fr(ox, oy, 24, 16, 2, 2, "#d8bd80");
}
function drawWater(ox, oy, tx, ty) {
  fr(ox, oy, 0, 0, TILE, TILE, "#2f5fae");        // 水面
  const off = ((tx + ty) & 1) ? 6 : 0;            // タイルごとに波の位相をずらす
  for (const wy of [6, 16, 26]) {
    for (let x = -off; x < TILE; x += 12) {
      fr(ox, oy, Math.max(0, x), wy, Math.min(6, TILE - Math.max(0, x)), 2, "#4a7fca");
    }
  }
  fr(ox, oy, 8 + off, 10, 2, 1, "#a9cdf2");        // 白波ハイライト
  fr(ox, oy, 22 - off, 22, 2, 1, "#a9cdf2");
}
function drawMountain(ox, oy) {
  fr(ox, oy, 0, 0, TILE, TILE, "#3f7d38");         // 裾野の草地
  const peak = 16;
  for (let i = 0; i < 24; i++) {
    const y = 6 + i;
    const hw = Math.floor(i * 0.72) + 2;
    fr(ox, oy, peak - hw, y, hw * 2, 1, "#7a716a");     // 岩肌
    fr(ox, oy, peak - hw, y, 2, 1, "#9c9288");          // 左の陽当たり
    fr(ox, oy, peak + hw - 2, y, 2, 1, "#554e48");      // 右の陰
    if (i < 4) fr(ox, oy, peak - hw + 1, y, hw * 2 - 2, 1, "#e8ecf4"); // 雪冠
  }
}
function drawTown(ox, oy) {
  drawGrass(ox, oy);
  // 屋根（赤い三角）
  for (let i = 0; i < 10; i++) fr(ox, oy, 16 - (2 + i), 6 + i, (2 + i) * 2, 1, "#b5452e");
  // 壁
  fr(ox, oy, 7, 15, 18, 13, "#d8c48a");
  fr(ox, oy, 7, 15, 18, 2, "#e6d6a4");             // 壁のハイライト
  // ドア・窓
  fr(ox, oy, 13, 20, 6, 8, "#5a3a1e");
  fr(ox, oy, 9, 18, 3, 3, "#7fb0e0");
  fr(ox, oy, 20, 18, 3, 3, "#7fb0e0");
}
function drawCastle(ox, oy) {
  drawGrass(ox, oy);
  // 石壁
  fr(ox, oy, 5, 10, 22, 18, "#9aa2ac");
  fr(ox, oy, 21, 10, 6, 18, "#767d87");            // 右側の陰
  // 胸壁（凸凹）
  for (const bx of [5, 11, 17, 23]) fr(ox, oy, bx, 6, 4, 4, "#9aa2ac");
  // 石目
  fr(ox, oy, 5, 16, 22, 1, "#767d87");
  fr(ox, oy, 5, 22, 22, 1, "#767d87");
  // アーチの門
  fr(ox, oy, 13, 18, 6, 10, "#35304a");
  // 旗
  fr(ox, oy, 16, 1, 1, 6, "#888");
  fr(ox, oy, 17, 1, 5, 3, "#c02020");
}
function drawTile(type, tx, ty) {
  const ox = tx * TILE, oy = ty * TILE;
  switch (type) {
    case 0: drawGrass(ox, oy); break;
    case 1: drawRoad(ox, oy); break;
    case 2: drawWater(ox, oy, tx, ty); break;
    case 3: drawMountain(ox, oy); break;
    case 4: drawCastle(ox, oy); break;
    case 5: drawTown(ox, oy); break;
    default:
      fr(ox, oy, 0, 0, TILE, TILE, (TILES[type] && TILES[type].color) || "#000");
  }
}

/* ---------------- 主人公スプライト（4方向） ----------------
 * 12x14px を 2px セルで描画（=24x28、タイル中央寄せ）。横向きは side を左右反転して使う。
 */
const HERO_PAL = { o: "#1a1a2e", c: "#3f57c8", s: "#f2c79a", e: "#1a1a2e", b: "#c73a2a", a: "#f2c79a", l: "#5a3a1e" };
const HERO = {
  down: [
    "....oooo....", "...occcco...", "..occcccco..", "..osssssso..",
    "..osesseso..", "..osssssso..", "...ossso....", "..obbbbbbo..",
    ".oabbbbbbao.", ".oabbbbbbao.", "..obbbbbbo..", "..obbbbbbo..",
    "..oll..llo..", "..oll..llo..",
  ],
  up: [
    "....oooo....", "...occcco...", "..occcccco..", "..occcccco..",
    "..occcccco..", "..occcccco..", "...occco....", "..obbbbbbo..",
    ".oabbbbbbao.", ".oabbbbbbao.", "..obbbbbbo..", "..obbbbbbo..",
    "..oll..llo..", "..oll..llo..",
  ],
  side: [
    "...oooo.....", "..occcco....", ".occcccco...", ".ocsssseo...",
    ".ocssssso...", ".occssso....", "..occso.....", "..obbbbbbo..",
    ".oabbbbbbao.", ".oabbbbbbao.", "..obbbbbbo..", "..obbbbbbo..",
    "..oll.llo...", "..oll.llo...",
  ],
};
function drawHero(tx, ty, dir) {
  const ox = tx * TILE + 4, oy = ty * TILE + 2;
  let rows = HERO.down, flip = false;
  if (dir === "up") rows = HERO.up;
  else if (dir === "left") { rows = HERO.side; flip = true; }
  else if (dir === "right") rows = HERO.side;
  drawBitmap(rows, HERO_PAL, ox, oy, 2, flip);
}

function drawField() {
  for (let y = 0; y < MAP_H; y++) {
    for (let x = 0; x < MAP_W; x++) {
      drawTile(MAP[y][x], x, y);
    }
  }
  // 将来: タイトル画面を作る場合、定数 TITLE_IMAGE(PNGのdataURI)があれば
  //       それを一枚絵として使う受け皿をここ/初期化側に足せる（無ければ現状描画）。
  drawHero(player.x, player.y, player.dir);
}

// バトル背景＋敵のドット絵
function drawBattle(enemy) {
  if (enemy.boss) {
    // ボス専用の禍々しい背景（暗い赤紫＋足元の赤い霧）
    const bands = [["#1a0812", 0], ["#2a0c18", 90], ["#3a1020", 170], ["#220a16", 250]];
    for (let i = 0; i < bands.length; i++) {
      const y0 = bands[i][1], y1 = (i + 1 < bands.length) ? bands[i + 1][1] : canvas.height - 64;
      ctx.fillStyle = bands[i][0]; ctx.fillRect(0, y0, canvas.width, y1 - y0);
    }
    ctx.fillStyle = "#140610"; ctx.fillRect(0, canvas.height - 64, canvas.width, 64);
    ctx.fillStyle = "#5a1020"; ctx.fillRect(0, canvas.height - 64, canvas.width, 4);  // 赤い地平線
  } else {
    // 夜空〜地面
    ctx.fillStyle = "#0a0a16";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#161628";
    ctx.fillRect(0, canvas.height - 64, canvas.width, 64);   // 地面帯
    ctx.fillStyle = "#20203a";
    ctx.fillRect(0, canvas.height - 64, canvas.width, 3);    // 地平線
  }

  const cx = canvas.width / 2;
  const cy = canvas.height / 2 - 14;
  // 足元の影
  const shW = enemy.boss ? 120 : 70;
  ctx.fillStyle = "rgba(0,0,0,0.4)";
  ctx.fillRect(cx - shW / 2, canvas.height - 60, shW, 8);

  const scale = enemy.boss ? 7 : 5;
  drawDotMonster(enemy, cx, cy, scale);

  // 敵名
  ctx.fillStyle = "#fff";
  ctx.font = "16px monospace";
  ctx.textAlign = "center";
  ctx.textBaseline = "top";
  ctx.fillText(enemy.name + "  HP:" + Math.max(0, enemy.hp), cx, 12);
}

/* ---------------- モンスターのドット絵 ----------------

const MONSTERS = {

    ],

    rows: [
      "o.........o", "oo.......oo", "owo.ooo.owo", "owwobbbowwo",

      ".oobbbbbbboo.", "oobebbbbbeboo", "obbbbbbbbbbbo", "obbrrrbrrrbbo",
      ".obbbbbbbbbo.", "..obwwwwwbo..", ".oobwwwwwboo.", "oo.o.....o.oo",
    ],
  },
};

/* ---------------- ボス専用の大きなドット絵（りゅうおう） ----------------
 * 通常の MONSTERS.dragon より一回り大きく・描き込んだ 18x16 の専用グラフィック。
 * 角・光る目・牙のある大きな口・クリーム色の腹・金の爪。ボス戦でのみ使う。
 */
// 左半分(9列)を左右反転して18幅の対称シルエットを作る（手打ちの桁ズレを防ぐ）
const _BOSS_L = [
  "....w....", "....wo...", "d...wo.oo", "dd..dobbb",
  "ddd.obebb", "dddoblbbb", "dddobbbbb", "ddoobrrrr",
  "d..obtrtr", "...obbwww", "..obbbwww", "..obbbbww",
  ".obbbbbbw", ".obdbbbdb", ".obbbggbb", "..oggggo.",
];
const BOSS_DRAGON = {
  pal: {
    o: "#0c2c12", b: "#2f8f28", d: "#1d5e1c", l: "#7fd06a",
    w: "#ece4c0", r: "#b81f28", t: "#f4f4e8", e: "#ffd027", g: "#e0b83a",
  },
  rows: _BOSS_L.map(s => s + s.split("").reverse().join("")),
};

/* 将来: 定数 BOSS_IMAGE(PNGのdataURI)があれば、ボスをドット絵の代わりに一枚絵で表示する受け皿。
 * 未定義ならドット絵にフォールバックする（typeofは未宣言でも安全）。 */
let _bossImg = null;
function getBossImage() {
  if (typeof BOSS_IMAGE === "undefined" || !BOSS_IMAGE) return null;
  if (!_bossImg) {
    _bossImg = new Image();
    _bossImg.onload = () => {
      if (gameState === STATE.BATTLE && battle && battle.enemy.boss) drawBattle(battle.enemy);
    };
    _bossImg.src = BOSS_IMAGE;
  }
  return (_bossImg.complete && _bossImg.naturalWidth) ? _bossImg : null;
}

function drawDotMonster(enemy, cx, cy, s) {
  if (enemy.boss) {
    const img = getBossImage();
    if (img) {
      const iw = img.naturalWidth, ih = img.naturalHeight;
      const sc = Math.min(240 / iw, 200 / ih);
      ctx.drawImage(img, Math.round(cx - iw * sc / 2), Math.round(cy - ih * sc / 2),
        Math.round(iw * sc), Math.round(ih * sc));
      return;
    }
    // PNGが無ければ専用の大きなドット絵ボスを描く
    const brw = BOSS_DRAGON.rows[0].length, brh = BOSS_DRAGON.rows.length;
    const bs = 13;   // 通常敵(scale 5)よりかなり大きく
    drawBitmap(BOSS_DRAGON.rows, BOSS_DRAGON.pal,
      Math.round(cx - brw * bs / 2), Math.round(cy - brh * bs / 2), bs, false);
    return;
  }
  const m = MONSTERS[enemy.id] || MONSTERS.slime;
  const rw = m.rows[0].length, rh = m.rows.length;
  const ox = Math.round(cx - rw * s / 2);
  const oy = Math.round(cy - rh * s / 2);
  drawBitmap(m.rows, m.pal, ox, oy, s, false);
}

/* =========================================================================
 * UI更新
 * ========================================================================= */
function updateStatus() {
  $status.innerHTML =
    `<span>Lv <b>${player.level}</b></span>` +
    `<span>HP <b style="color:#7f7">${player.hp}</b>/${player.maxhp}</span>` +
    `<span>MP <b style="color:#7bf">${player.mp}</b>/${player.maxmp}</span>` +
    `<span>ちから ${player.atk}</span>` +
    `<span>みのまもり ${player.def}</span>` +
    `<span>EXP ${player.exp}</span>` +
    `<span>G <b style="color:#fd5">${player.gold}</b></span>`;
}

function setMessage(text) { $message.innerHTML = text; }
function addMessage(text) { $message.innerHTML += "<br>" + text; }

/* =========================================================================
 * フィールド：移動処理
 * ========================================================================= */
function tryMove(dx, dy) {
  if (gameState !== STATE.FIELD) return;
  player.dir = dx < 0 ? "left" : dx > 0 ? "right" : dy < 0 ? "up" : "down";
  const nx = player.x + dx, ny = player.y + dy;
  if (nx < 0 || ny < 0 || nx >= MAP_W || ny >= MAP_H) { drawField(); return; }
  const tile = TILES[MAP[ny][nx]];
  if (!tile.walk) { SE.damage(); drawField(); return; } // 壁・水はブロック（向きだけ変える）
  player.x = nx; player.y = ny;
  SE.move();
  drawField();

  // 城に到達 → ボス戦
  if (MAP[ny][nx] === 4 && !bossDefeated) {
    setMessage("しろの おくに りゅうおうが まっていた…！");
    setTimeout(() => startBattle(ENEMIES.find(e => e.boss)), 700);
    return;
  }
  // 町に到達 → 全回復
  if (MAP[ny][nx] === 5) {
    player.hp = player.maxhp; player.mp = player.maxmp;
    updateStatus();
    setMessage("まちに ついた。HPとMPが ぜんかい した！");
    SE.heal();
    return;
  }
  // ランダムエンカウント（草原のみ）
  if (tile.encounter && Math.random() < 0.16) {
    const e = WILD_TABLE[Math.floor(Math.random() * WILD_TABLE.length)];
    startBattle(e);
  }
}

/* =========================================================================
 * バトル
 * ========================================================================= */
let battle = null; // { enemy, busy }

function startBattle(enemyDef) {
  // 敵インスタンスを複製（元データを壊さない）
  const enemy = Object.assign({}, enemyDef);
  enemy.maxhp = enemy.hp;
  battle = { enemy, busy: false };
  gameState = STATE.BATTLE;
  SE.attack();
  drawBattle(enemy);
  setMessage((enemy.boss ? "りゅうおう が たちふさがった！" : enemy.name + " が あらわれた！"));
  setTimeout(showMainCommands, 500);
}

// メニュー描画：items = [{label, onSelect}]
let menuItems = [];
let menuIndex = 0;
let menuTitle = "コマンド？";
function showMenu(title, items) {
  menuTitle = title;
  menuItems = items;
  menuIndex = 0;
  $menu.style.display = "block";
  renderMenu();
}
function renderMenu() {
  $menu.querySelector(".menu-title").textContent = menuTitle;
  $menuList.innerHTML = "";
  menuItems.forEach((it, i) => {
    const li = document.createElement("li");
    li.textContent = it.label;
    if (i === menuIndex) li.classList.add("selected");
    li.addEventListener("click", () => { menuIndex = i; renderMenu(); confirmMenu(); });
    li.addEventListener("mouseenter", () => { menuIndex = i; renderMenu(); });
    $menuList.appendChild(li);
  });
}
function hideMenu() { $menu.style.display = "none"; menuItems = []; }
function moveMenu(d) {
  if (!menuItems.length) return;
  menuIndex = (menuIndex + d + menuItems.length) % menuItems.length;
  renderMenu();
  SE.select();
}
function confirmMenu() {
  if (!menuItems.length || battle && battle.busy) return;
  const it = menuItems[menuIndex];
  SE.select();
  if (it && it.onSelect) it.onSelect();
}

function showMainCommands() {
  if (gameState !== STATE.BATTLE) return;
  showMenu("コマンド？", [
    { label: "たたかう",   onSelect: playerAttack },
    { label: "じゅもん",   onSelect: showSpellCommands },
    { label: "にげる",     onSelect: playerFlee },
  ]);
}

function showSpellCommands() {
  const items = player.spells.map(id => {
    const sp = SPELLS[id];
    return { label: `${sp.name}(${sp.mp})`, onSelect: () => playerCast(id) };
  });
  items.push({ label: "← もどる", onSelect: showMainCommands });
  showMenu("じゅもん？", items);
}

// ダメージ計算（攻撃側atk・守備側def）＋ゆらぎ
function calcDamage(atk, def) {
  const base = Math.max(1, atk - Math.floor(def / 2));
  const dmg = base + Math.floor(Math.random() * (base * 0.4 + 2)) - Math.floor(base * 0.15);
  return Math.max(1, Math.round(dmg));
}

function playerAttack() {
  if (battle.busy) return;
  battle.busy = true; hideMenu();
  const dmg = calcDamage(player.atk, battle.enemy.def);
  battle.enemy.hp -= dmg;
  SE.attack();
  setMessage(`ゆうしゃの こうげき！`);
  addMessage(`${battle.enemy.name}に ${dmg}の ダメージ！`);
  drawBattle(battle.enemy);
  setTimeout(afterPlayerAction, 700);
}

function playerCast(id) {
  const sp = SPELLS[id];
  if (player.mp < sp.mp) {
    battle.busy = true; hideMenu();
    setMessage("MPが たりない！");
    setTimeout(() => { battle.busy = false; showMainCommands(); }, 600);
    return;
  }
  battle.busy = true; hideMenu();
  player.mp -= sp.mp;
  updateStatus();
  if (sp.type === "attack") {
    const dmg = sp.power + Math.floor(Math.random() * 6);
    battle.enemy.hp -= dmg;
    SE.spell();
    setMessage(`ゆうしゃは ${sp.name}を となえた！`);
    addMessage(sp.msg);
    addMessage(`${battle.enemy.name}に ${dmg}の ダメージ！`);
    drawBattle(battle.enemy);
  } else { // heal
    const before = player.hp;
    player.hp = Math.min(player.maxhp, player.hp + sp.power + Math.floor(Math.random()*6));
    SE.heal();
    updateStatus();
    setMessage(`ゆうしゃは ${sp.name}を となえた！`);
    addMessage(sp.msg + ` (+${player.hp - before})`);
  }
  setTimeout(afterPlayerAction, 800);
}

function playerFlee() {
  if (battle.busy) return;
  battle.busy = true; hideMenu();
  if (battle.enemy.boss) {
    setMessage("りゅうおうから は にげられない！");
    setTimeout(() => { battle.busy = false; enemyTurn(); }, 800);
    return;
  }
  if (Math.random() < 0.6) {
    setMessage("ゆうしゃは にげだした！");
    SE.move();
    setTimeout(endBattleReturnField, 900);
  } else {
    setMessage("しかし まわりこまれて しまった！");
    setTimeout(() => { battle.busy = false; enemyTurn(); }, 900);
  }
}

// プレイヤー行動後 → 敵撃破判定 → 敵ターン
function afterPlayerAction() {
  if (battle.enemy.hp <= 0) { winBattle(); return; }
  enemyTurn();
}

function enemyTurn() {
  battle.busy = true;
  const e = battle.enemy;
  // ボスはたまに強攻撃／回復（簡単なAI）
  let dmg;
  if (e.boss && Math.random() < 0.3) {
    dmg = calcDamage(e.atk + 12, player.def);
    setMessage(`${e.name}は かえんを はいた！`);
  } else {
    dmg = calcDamage(e.atk, player.def);
    setMessage(`${e.name}の こうげき！`);
  }
  player.hp -= dmg;
  SE.damage();
  addMessage(`ゆうしゃは ${dmg}の ダメージを うけた！`);
  if (player.hp < 0) player.hp = 0;
  updateStatus();

  setTimeout(() => {
    if (player.hp <= 0) { gameOver(); return; }
    battle.busy = false;
    showMainCommands();
  }, 900);
}

function winBattle() {
  battle.busy = true;
  const e = battle.enemy;
  SE.win();
  if (e.boss) {
    setMessage("りゅうおうを たおした！！");
    bossDefeated = true;
    setTimeout(gameClear, 1200);
    return;
  }
  setMessage(`${e.name}を やっつけた！`);
  addMessage(`けいけんち ${e.exp} と ${e.gold}ゴールド を てにいれた！`);
  player.exp += e.exp;
  player.gold += e.gold;
  const leveled = checkLevelUp();
  updateStatus();
  setTimeout(endBattleReturnField, leveled ? 1600 : 1100);
}

function checkLevelUp() {
  let leveled = false;
  while (player.level + 1 < LEVELS.length && player.exp >= LEVELS[player.level + 1].need) {
    player.level++;
    const L = LEVELS[player.level];
    player.maxhp = L.maxhp; player.maxmp = L.maxmp;
    player.atk = L.atk; player.def = L.def;
    player.hp = player.maxhp; player.mp = player.maxmp; // レベルアップで全回復
    addMessage(`<span style="color:#ffe94d">レベルが ${player.level}に あがった！</span>`);
    if (L.learn && !player.spells.includes(L.learn)) {
      player.spells.push(L.learn);
      addMessage(`<span style="color:#7bf">じゅもん「${SPELLS[L.learn].name}」を おぼえた！</span>`);
    }
    SE.levelup();
    leveled = true;
  }
  return leveled;
}

function endBattleReturnField() {
  battle = null;
  gameState = STATE.FIELD;
  hideMenu();
  drawField();
  setMessage("たびは つづく…");
}

/* =========================================================================
 * ゲームオーバー / クリア
 * ========================================================================= */
function gameOver() {
  gameState = STATE.GAMEOVER;
  hideMenu();
  SE.dead();
  ctx.fillStyle = "rgba(0,0,0,0.85)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "#f55";
  ctx.font = "28px monospace";
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText("ゆうしゃは しんでしまった", canvas.width/2, canvas.height/2 - 10);
  setMessage('<span class="blink">Enter / Z で いきかえる</span>（レベルは そのまま）　（X / Esc で タイトルへ）');
}

function gameClear() {
  gameState = STATE.CLEAR;
  hideMenu();
  SE.win();
  ctx.fillStyle = "rgba(0,0,0,0.85)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "#ffe94d";
  ctx.font = "26px monospace";
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText("★ りゅうおうを たおした！ ★", canvas.width/2, canvas.height/2 - 24);
  ctx.font = "16px monospace";
  ctx.fillStyle = "#fff";
  ctx.fillText("せかいに へいわが もどった。", canvas.width/2, canvas.height/2 + 12);
  ctx.fillText("- THE END -", canvas.width/2, canvas.height/2 + 42);
  setMessage('クリアおめでとう！ <span class="blink">Enter / Z で もういちど</span>　（X / Esc で タイトルへ）');

/* ---------------- リセット（タイトルからの新規ゲーム：レベル1に完全初期化） ---------------- */
function resetGame() {
  Object.assign(player, {
    x: 0, y: 0, dir: "down", level: 1, exp: 0, gold: 0,
    hp: 30, maxhp: 30, mp: 8, maxmp: 8, atk: 12, def: 8,
    spells: ["mera", "hoimi"],
  });
  bossDefeated = false;
  battle = null;
  gameState = STATE.FIELD;
  hideMenu();
  updateStatus();
  drawField();
  setMessage("ゆうしゃよ、りゅうおうを たおすのだ！");
}

/* ---------------- 復活（ゲームオーバーからの蘇生：成長は維持しHP/MPだけ全回復） ----------------
 * レベル/経験値/こうげき/しゅび/最大HP・MP/覚えた呪文/ゴールドは引き継ぎ、
 * HP/MPを最大まで回復してスタート地点(町)へ戻すだけ。bossDefeated等の進行状態は保持。
 */
function reviveGame() {
  player.hp = player.maxhp;
  player.mp = player.maxmp;
  player.x = 0; player.y = 0; player.dir = "down";
  battle = null;
  gameState = STATE.FIELD;
  hideMenu();
  updateStatus();
  drawField();
  setMessage("かみの ちからで ゆうしゃは いきかえった！");
}

/* =========================================================================
 * タイトル画面（canvasドット絵のキービジュアル＋ロゴ＋点滅プロンプト）
 * ========================================================================= */
const TITLE_TEXT = "りゅうおうの ぼうけん";   // ← 題名はここで差し替え可能
let titleTimer = null, titleBlink = true;

function showTitle() {
  gameState = STATE.TITLE;
  hideMenu();
  battle = null;
  $status.innerHTML = '<span style="color:#9ec98a">ドラゴンクエスト風 レトロRPG</span>';
  setMessage("つよき ゆうしゃよ、りゅうおうを たおし へいわを とりもどせ。");
  if (titleTimer) clearInterval(titleTimer);
  titleBlink = true;
  drawTitle();
  titleTimer = setInterval(() => {
    if (gameState !== STATE.TITLE) return;
    titleBlink = !titleBlink;
    drawTitle();
  }, 550);
}

function startGame() {
  if (titleTimer) { clearInterval(titleTimer); titleTimer = null; }
  SE.select();
  resetGame();   // player初期化・FIELDへ・ステータス/メッセージ復帰
}

function drawTitle() {
  const W = canvas.width, H = canvas.height;
  // 空（夕暮れ→夜のグラデを横帯で）
  const bands = [[0, "#12102e"], [36, "#1b1740"], [72, "#2c2150"], [108, "#4a2b54"],
    [150, "#7a3a4e"], [188, "#b0522f"], [222, "#dd7a34"]];
  for (let i = 0; i < bands.length; i++) {
    const y0 = bands[i][0], y1 = (i + 1 < bands.length) ? bands[i + 1][0] : 250;
    ctx.fillStyle = bands[i][1]; ctx.fillRect(0, y0, W, y1 - y0);
  }
  // 星
  ctx.fillStyle = "#e8e6ff";
  const stars = [[30, 24], [70, 50], [120, 18], [180, 60], [220, 30], [300, 20],
    [350, 54], [400, 34], [455, 70], [485, 22], [150, 90], [260, 82]];
  for (const [sx, sy] of stars) ctx.fillRect(sx, sy, 2, 2);
  // 月
  drawTitleMoon(420, 58, 18);
  // 地平線の下地
  ctx.fillStyle = "#16311a"; ctx.fillRect(0, 250, W, H - 250);
  // 遠景の城とその上を舞う竜のシルエット
  drawTitleCastle(300, 252);
  drawTitleDragonSilhouette(372, 116);
  // 手前の草原の丘
  drawTitleHill();
  // 主人公（剣を掲げて城の方を向く）
  drawTitleHero(150, 322);
  // ロゴ
  drawTitleLogo(W / 2, 46);
  // 開始プロンプト（点滅）
  if (titleBlink) {
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.font = "16px 'MS Gothic', monospace";
    ctx.lineWidth = 4; ctx.strokeStyle = "#000";
    ctx.strokeText("▶ Enter / Z / Space ではじめる", W / 2, H - 22);
    ctx.fillStyle = "#ffe94d";
    ctx.fillText("▶ Enter / Z / Space ではじめる", W / 2, H - 22);
  }
}

function drawTitleMoon(cx, cy, r) {
  ctx.fillStyle = "#f2ead0";
  for (let y = -r; y <= r; y++) {
    const xw = Math.floor(Math.sqrt(Math.max(0, r * r - y * y)));
    ctx.fillRect(cx - xw, cy + y, xw * 2, 1);
  }
  ctx.fillStyle = "#ddd2ad";
  ctx.fillRect(cx - 6, cy - 4, 4, 4);
  ctx.fillRect(cx + 2, cy + 3, 5, 5);
  ctx.fillRect(cx - 1, cy + 9, 3, 3);
}

function drawTitleCastle(cx, baseY) {
  const sil = "#0e0a1e";
  ctx.fillStyle = sil;
  ctx.fillRect(cx - 40, baseY - 54, 80, 54);          // 本体
  ctx.fillRect(cx - 52, baseY - 74, 18, 74);          // 左塔
  ctx.fillRect(cx + 34, baseY - 74, 18, 74);          // 右塔
  ctx.fillRect(cx - 13, baseY - 104, 26, 104);        // 中央の高い塔
  // 胸壁（凸凹）
  for (const bx of [-52, -44, -36, -13, -3, 7, 34, 42, 50]) ctx.fillRect(cx + bx, baseY - 80, 5, 6);
  ctx.fillRect(cx - 13, baseY - 110, 5, 8); ctx.fillRect(cx - 1, baseY - 110, 6, 8); ctx.fillRect(cx + 8, baseY - 110, 5, 8);
  // 不気味に灯る窓
  ctx.fillStyle = "#7a1520";
  ctx.fillRect(cx - 3, baseY - 92, 6, 9);
  ctx.fillStyle = "#c8802a";
  ctx.fillRect(cx - 46, baseY - 60, 4, 6); ctx.fillRect(cx + 42, baseY - 60, 4, 6);
  ctx.fillRect(cx - 24, baseY - 34, 4, 6); ctx.fillRect(cx + 20, baseY - 34, 4, 6);
}

// 遠景の竜シルエット（既存 dragon の形を暗色で流用、目だけ赤く光らせる）
function drawTitleDragonSilhouette(cx, cy) {
  const sil = "#0d0a1c";
  const pal = { o: sil, b: sil, r: sil, e: "#ff4028", w: sil };
  const rows = MONSTERS.dragon.rows, s = 4;
  const rw = rows[0].length, rh = rows.length;
  drawBitmap(rows, pal, Math.round(cx - rw * s / 2), Math.round(cy - rh * s / 2), s, false);
}

function drawTitleHill() {
  const W = canvas.width, H = canvas.height;
  ctx.fillStyle = "#1e3a1c"; ctx.fillRect(0, 262, W, H - 262);   // 奥の丘
  // 手前の丘（ゆるいうねり）
  ctx.fillStyle = "#264d1f";
  for (let x = 0; x < W; x++) {
    const y = 300 + Math.round(14 * Math.sin(x / 90) + 6 * Math.sin(x / 23));
    ctx.fillRect(x, y, 1, H - y);
  }
  // 草
  ctx.fillStyle = "#37702c";
  for (let i = 0; i < 46; i++) {
    const gx = (i * 41 + 9) % W, gy = 320 + ((i * 17) % 42);
    ctx.fillRect(gx, gy, 2, 4); ctx.fillRect(gx - 2, gy + 1, 2, 3);
  }
}

function drawTitleHero(hx, footY) {
  const s = 4, w = 12 * s, h = 14 * s;
  const ox = Math.round(hx - w / 2), oy = footY - h;
  drawBitmap(HERO.side, HERO_PAL, ox, oy, s, false);   // 城(右)を向く
  // 掲げた剣（前方＝右手側）
  const bx = ox + w + 2;
  ctx.fillStyle = "#c9ced8"; ctx.fillRect(bx, oy - 24, 4, 46);      // 刀身
  ctx.fillStyle = "#eef2f8"; ctx.fillRect(bx + 1, oy - 24, 1, 46);  // ハイライト
  ctx.fillStyle = "#e0b83a"; ctx.fillRect(bx - 4, oy + 20, 12, 4);  // 鍔
  ctx.fillStyle = "#7a4a1e"; ctx.fillRect(bx, oy + 24, 4, 8);       // 柄
}

function drawTitleLogo(cx, y) {
  ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.lineJoin = "round";
  ctx.font = "bold 30px 'MS Gothic', monospace";
  ctx.fillStyle = "#000"; ctx.fillText(TITLE_TEXT, cx + 3, y + 3);   // 影
  ctx.lineWidth = 6; ctx.strokeStyle = "#3a1a0a"; ctx.strokeText(TITLE_TEXT, cx, y); // 縁取り
  ctx.fillStyle = "#ffd94a"; ctx.fillText(TITLE_TEXT, cx, y);        // 本体（金）
  ctx.font = "12px 'MS Gothic', monospace"; ctx.fillStyle = "#e8e0ff";
  ctx.fillText("- THE DRAGON QUEST -", cx, y + 26);
}

/* =========================================================================
 * 入力
 * ========================================================================= */
window.addEventListener("keydown", (e) => {
  const k = e.key.toLowerCase();

  // 音トグル
  if (k === "m") { soundOn = !soundOn; return; }

  if (gameState === STATE.TITLE) {
    if (k === "enter" || k === "z" || k === " ") { startGame(); e.preventDefault(); }
    return;
  }

  if (gameState === STATE.FIELD) {
    if (k === "arrowup" || k === "w")    { tryMove(0, -1); e.preventDefault(); }
    else if (k === "arrowdown" || k === "s")  { tryMove(0, 1);  e.preventDefault(); }
    else if (k === "arrowleft" || k === "a")  { tryMove(-1, 0); e.preventDefault(); }
    else if (k === "arrowright" || k === "d") { tryMove(1, 0);  e.preventDefault(); }
    else if (k === " ") { e.preventDefault(); } // フィールドでのSpaceによるページスクロール抑止
    return;
  }

  if (gameState === STATE.BATTLE) {
    if (battle && battle.busy) return;
    if (k === "arrowup" || k === "w")   { moveMenu(-1); e.preventDefault(); }
    else if (k === "arrowdown" || k === "s") { moveMenu(1); e.preventDefault(); }
    else if (k === "enter" || k === "z" || k === " ") { confirmMenu(); e.preventDefault(); }
    else if (k === "x" || k === "escape") {
      // じゅもんメニューからメインへ戻る
      if (menuTitle === "じゅもん？") showMainCommands();
    }
    return;
  }

  if (gameState === STATE.GAMEOVER) {
    if (k === "enter" || k === "z" || k === " ") { reviveGame(); e.preventDefault(); }  // 成長を維持して復活
    else if (k === "x" || k === "escape") { showTitle(); e.preventDefault(); }          // タイトルへ戻る
    return;
  }

  if (gameState === STATE.CLEAR) {
    if (k === "enter" || k === "z" || k === " ") { resetGame(); e.preventDefault(); }   // クリア後は新規ゲーム
    else if (k === "x" || k === "escape") { showTitle(); e.preventDefault(); }          // タイトルへ戻る
  }
});

/* =========================================================================
 * 初期化 — まずタイトル画面を表示（Enter/Z/Space でゲーム開始）
 * ========================================================================= */
updateStatus();
showTitle();
</script>
