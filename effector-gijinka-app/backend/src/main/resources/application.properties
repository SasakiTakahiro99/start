# --- Server ---
server.port=8080

# --- H2 (file-based so saves survive restarts; swap the datasource block for PostgreSQL later) ---
spring.datasource.url=jdbc:h2:file:./data/effectordb;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# H2 web console at http://localhost:8080/h2-console (JDBC URL above, user sa, empty password)
# 認証なしで到達可能なため、デフォルトでは無効化する。ローカルで使いたい場合は
# `--spring.profiles.active=dev` を付けて起動すると application-dev.properties で有効化される。
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

# セッションCookie(JSESSIONID)にSameSite属性を明示し、CSRF無効化と合わせてクロスサイト送信を抑止する。
server.servlet.session.cookie.same-site=Lax
